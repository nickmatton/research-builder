# Claims Ledger
#
# Canonical machine-readable source for the paper's headline numerical claims.
# The `claims` MCP server reads/writes this file. The `compare-to-paper` skill
# verifies runs against it.
#
# Status rubric (see .claude/skills/compare-to-paper.md):
#   verified | close | missed | exceeded | not_checked
#
# When adding a claim by hand, match the structure below. Or use the MCP tool
# `claims.add_claim(...)`. Stable snake_case claim_ids — renaming breaks
# comparisons across runs in notes/journal.md.

claims:
  - claim_id: table2_cifar10_top1
    metric: top-1 accuracy
    value: 95.2
    tolerance: 0.3
    unit: "%"
    dataset: CIFAR-10 test
    condition: "ResNet-50, 200 epochs"
    source:
      table: "Table 2"
      page: 7
      verbatim: "95.2 ± 0.3"
    phase: eval
    notes: "mean of 3 runs"

  - claim_id: table3_latency_ms
    metric: inference latency
    value: 12.3
    tolerance: 0.0
    unit: ms
    dataset: "CIFAR-10, batch=1"
    condition: "RTX 3090"
    source:
      table: "Table 3"
      page: 8
      verbatim: "12.3"
    phase: eval
    notes: ""

